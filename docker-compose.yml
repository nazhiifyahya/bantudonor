services:
  web:
    build: .
    container_name: bantu-donor-app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    env_file: .env
    depends_on:
      - db
    networks:
      - bantuDonorNetwork
  
  db:
    image: mysql:8.0
    container_name: bantu-donor-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MySQL_DB_PASSWORD}
      MYSQL_DATABASE: ${MySQL_DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - bantuDonorNetwork
networks:
  bantuDonorNetwork:
    driver: bridge

volumes:
  db_data: